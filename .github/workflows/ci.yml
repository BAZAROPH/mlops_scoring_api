name: CI Pipeline API Scoring

#1 On dit à Github de se déclencher à chaque push sur la branche main ou master
on:
    push:
        branches:
            - main
            - master

jobs:
    #--- 1ère Tâche : L'Intégration Continue (CI) ---
    test-api:
        #On demande un serveur linux
        runs-on: ubuntu-latest
        
        steps:
            #Récupérer notre code
            -   name: Récupération du code
                uses: actions/checkout@v2

            #Intaller python sur le serveur
            -   name: Installation Python
                uses: actions/setup-python@v4
                with:
                    python-version: "3.11"

            #Installer les librairies du projet
            -   name: Installation des dépendances
                run: |
                    python -m pip install --upgrade pip
                    pip install -r requirements.txt
                    pip install pytest pytest-cov lightgbm scikit-learn pandas joblib

            #Lancer la commande de test
            -   name: Lancement des tests automatisés
                run: |
                    PYTHONPATH=. pytest --cov=app tests/ -v --cov=app

    # --- 2ème Tâche : Le Déploiement Continu (CD) ---
    deploy-api:
        #Nous déployons que si les tests passent
        needs: test-api
        runs-on: ubuntu-latest
        steps:
            -   name: Récupération du code
                uses: actions/checkout@v2
                with:
                    fetch-depth: 0  # Récupérer tout l'historique pour les tags
                    
            -   name: Envoi sur Hugging Face
                env:
                    HF_TOKEN: ${{ secrets.HF_TOKEN }}
                run: |
                    git push https://bazaroph:$HF_TOKEN@huggingface.co/spaces/bazaroph/api-scoring-credit main --force
            

            